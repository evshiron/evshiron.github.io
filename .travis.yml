language: node_js
node_js:
  - lts/*
cache:
  directories:
  - $HOME/.npm
install:
  - npm ci
script:
  - npm run build
  - npm run export
  - touch out/.nojekyll
deploy:
  provider: pages
  skip-cleanup: true
  local-dir: out
  target_branch: master
  github-token:
    secure: 
  on:
    branch: source
